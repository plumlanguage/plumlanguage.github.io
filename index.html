<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目集 - 主页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- 加载动画 -->
<div class="loading-spinner"></div>

<nav class="navbar">
    <div class="container">
        <div class="nav-inner">
            <h1 class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24">
                    <path fill="var(--primary-color)" d="M12 2L2 7l10 5l10-5l-10-5Z"/>
                    <path fill="var(--primary-color)" d="M2 17l10 5l10-5"/>
                    <path fill="var(--primary-color)" d="M2 12l10 5l10-5"/>
                </svg>
                项目集
            </h1>
            <div class="nav-controls">
                <input type="text" id="searchInput"
                       placeholder="搜索项目..."
                       class="search-box"
                       aria-label="项目搜索">
                <button class="theme-toggle" aria-label="主题切换">
                    <span class="light-icon">🌞</span>
                    <span class="dark-icon">🌙</span>
                </button>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <!-- 项目网格 -->
    <div class="projects-grid">
        <article class="project-card">
            <picture>
                <source srcset="images/t_ptp.png" type="image/webp">
                <img src="images/t_ptp.png" alt="PTP项目" class="card-image lazyload">
            </picture>
            <div class="card-content">
                <h2>PTP</h2>
                <p>Python的图形化打包器，支持多种打包器</p>
                <a href="DOC/PTP.html" class="card-button">查看详情</a>
            </div>
        </article>
    </div>

    <!-- 团队展示 -->
    <div class="team-section">
        <h2 class="section-title">开发团队</h2>
        <div class="team-grid">
            <div class="team-member">
                <img src="images/KinichJueMe.jpg" class="member-avatar lazyload" alt="成员头像">
                <h3>KnichJueMe</h3>
                <p>首席开发工程师</p>
                <div class="platform-links">
                    <!-- 这里是示例链接，后续您可以替换为实际的链接和logo -->
                    <a href="https://space.bilibili.com/3546858441935115" class="platform-link">
                        <img src="images/哔哩哔哩.png" alt="Bilibili" width="18" height="18">
                    </a>
                </div>
            </div>
            <div class="team-member">
                <img src="images/kimi.png" class="member-avatar lazyload" alt="成员头像">
                <h3>Kimi (Ai)</h3>
                <p>网页设计</p>
                <div class="platform-links">
                    <!-- 这里是示例链接，后续您可以替换为实际的链接和logo -->
                    <a href="https://space.bilibili.com/3546607314274766" class="platform-link">
                        <img src="images/哔哩哔哩.png" alt="Bilibili" width="18" height="18">
                    </a>
                    <a href="https://kimi.moonshot.cn/" class="platform-link">
                        <img src="images/官网.png" alt="www" width="18" height="18">
                    </a>
                </div>
            </div>
            <div class="team-member">
                <img src="images/deepseek.png" class="member-avatar lazyload" alt="成员头像">
                <h3>DeepSeek (Ai)</h3>
                <p>网页设计</p>
                <div class="platform-links">
                    <!-- 这里是示例链接，后续您可以替换为实际的链接和logo -->
                    <a href="https://chat.deepseek.com/" class="platform-link">
                        <img src="images/官网.png" alt="www" width="18" height="18">
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vanilla-lazyload@17.8.3/dist/lazyload.min.js"></script>
<script>
    // 初始化懒加载
    new LazyLoad();

    // 黑暗模式切换
    const themeToggle = document.querySelector('.theme-toggle');
    // 修改主题切换事件
    themeToggle.addEventListener('click', () => {
        const newTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme); // 存储状态
    });

    // 搜索功能
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('.project-card').forEach(card => {
            const title = card.querySelector('h2').textContent.toLowerCase();
            card.style.display = title.includes(term) ? 'block' : 'none';
        });
    });

    // 模拟加载完成
    window.addEventListener('load', () => {
        document.querySelector('.loading-spinner').style.display = 'none';
    });

    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);


</script>
</body>
</html>
